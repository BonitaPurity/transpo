databases:
  - name: transpo-db
    plan: free

services:
  - type: web
    name: transpo-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_MODE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: transpo-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: JWT_SECRET
        generateValue: true
